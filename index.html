<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Chaosifier</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Unbounded:wght@400;700;900&family=Space+Mono:wght@400;700&family=Press+Start+2P&family=Rye&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.1/lib/p5.min.js"></script>
</head>
<body>

    <nav id="rail">
        <div id="brand">Type Generator</div>

        <!-- Typography -->
        <div class="rail-section">
            <div class="section-label">Typography</div>

            <div class="control-group">
                <label>Word</label>
                <input type="text" id="wordInput" placeholder="Type something..." value="chaos" maxlength="20" spellcheck="false">
            </div>

            <div class="control-group">
                <label>Font</label>
                <select id="fontSelect">
                    <option value="Great Vibes">Great Vibes</option>
                    <option value="Unbounded">Unbounded</option>
                    <option value="Space Mono">Space Mono</option>
                    <option value="Press Start 2P">Press Start 2P</option>
                    <option value="Rye">Rye</option>
                </select>
            </div>

            <div class="control-group">
                <label>Font Size <span class="val" id="fontSizeVal">200</span></label>
                <input type="range" id="fontSizeSlider" min="60" max="450" value="200">
            </div>

            <div class="control-group">
                <label>Tracking <span class="val" id="trackingVal">0</span></label>
                <input type="range" id="trackingSlider" min="-20" max="120" value="0">
            </div>
        </div>

        <div class="rail-divider"></div>

        <!-- Particles -->
        <div class="rail-section">
            <div class="section-label">Particles</div>

            <div class="control-group">
                <label>Particle Size <span class="val" id="sizeVal">6</span></label>
                <input type="range" id="sizeSlider" min="2" max="20" value="6">
            </div>

            <div class="control-group">
                <label>Displacement <span class="val" id="displacementVal">4</span></label>
                <input type="range" id="displacementSlider" min="1" max="10" value="4">
            </div>

            <div class="control-group">
                <label>Speed <span class="val" id="speedVal">5</span></label>
                <input type="range" id="speedSlider" min="1" max="10" value="5">
            </div>

            <div class="control-group">
                <label>Color</label>
                <input type="color" id="colorPicker" value="#ffffff">
            </div>
        </div>

        <div class="rail-divider"></div>

        <!-- Style -->
        <div class="rail-section">
            <div class="section-label">Style</div>

            <div class="control-group">
                <label>Shape</label>
                <div class="btn-row">
                    <button class="tog-btn active" data-shape="circle">○</button>
                    <button class="tog-btn" data-shape="triangle">△</button>
                    <button class="tog-btn" data-shape="square">□</button>
                </div>
            </div>

            <div class="control-group">
                <label>Effect</label>
                <div class="btn-row">
                    <button class="effect-btn active" data-effect="none">None</button>
                    <button class="effect-btn" data-effect="glow">Glow</button>
                    <button class="effect-btn" data-effect="extrude">Depth</button>
                    <button class="effect-btn" data-effect="aura">Aura</button>
                </div>
            </div>
        </div>

        <div class="rail-divider"></div>

        <!-- Actions -->
        <div class="rail-section">
            <button id="screenshotBtn">↓ Download PNG</button>
        </div>
    </nav>

    <script src="sketch.js"></script>
</body>
</html>
